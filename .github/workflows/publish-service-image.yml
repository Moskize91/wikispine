name: Publish Service Image

# Manual workflow for the lightweight wikispine HTTP service image.
# It does not build or package runtime data; data/runtime must be mounted at runtime.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish, e.g. service-20260702 or service-20260702-1.
        required: true
        type: string
      push_dockerhub:
        description: Also push to Docker Hub using DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-service-image
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/wikispine-service

jobs:
  publish:
    name: Build and publish service image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate image tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          if [[ ! "${tag}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid image tag: ${tag}" >&2
            echo "Use a Docker-compatible tag like service-20260702 or service-20260702-1." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Image tag: ${tag}"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.push_dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          tags=(
            "--tag" "${GHCR_IMAGE}:${tag}"
          )
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=("--tag" "${GHCR_IMAGE}:latest")
          fi
          if [[ "${{ inputs.push_dockerhub }}" == "true" ]]; then
            dockerhub_image="${{ secrets.DOCKERHUB_USERNAME }}/wikispine-service"
            tags+=("--tag" "${dockerhub_image}:${tag}")
            if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
              tags+=("--tag" "${dockerhub_image}:latest")
            fi
          fi
          docker buildx build \
            --platform linux/amd64 \
            -f docker/Dockerfile \
            "${tags[@]}" \
            --push \
            .
